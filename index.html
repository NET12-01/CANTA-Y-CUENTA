<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canta y Cuenta - Aprende y Canta</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Comic Sans MS', 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #a78bfa 0%, #7dd3fc 100%);
    min-height: 100vh;
    padding: 20px;
  }
  h1 {
    text-align: center;
    color: white;
    font-size: 2.8rem;
    margin-bottom: 25px;
    text-shadow: 3px 3px 0px rgba(0,0,0,0.2);
    letter-spacing: 2px;
  }
  .container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 25px;
    max-width: 1200px;
    margin: 0 auto;
  }
  @media (max-width: 900px) {
    .container { grid-template-columns: 1fr; }
    h1 { font-size: 2.2rem; }
  }
  .card {
    background: rgba(255,255,255,0.92);
    border-radius: 30px;
    padding: 28px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    backdrop-filter: blur(4px);
    transition: transform 0.2s;
  }
  .card:hover { transform: scale(1.01); }
  .card h2 {
    font-size: 1.8rem;
    color: #5b21b6;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .numeros-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin-bottom: 15px;
  }
  .numero-btn {
    aspect-ratio: 1;
    font-size: 2.2rem;
    font-weight: bold;
    border: none;
    border-radius: 20px;
    background: linear-gradient(135deg, #fbbf24, #f59e0b);
    color: white;
    cursor: pointer;
    box-shadow: 0 6px 0 #d97706;
    transition: all 0.08s ease;
  }
  .numero-btn:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #d97706;
  }
  #visual {
    text-align: center;
    font-size: 3.2rem;
    min-height: 70px;
    margin: 10px 0 20px;
    transition: transform 0.2s;
  }
  .abecedario-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }
  .letra-btn {
    aspect-ratio: 1;
    font-size: 1.4rem;
    font-weight: bold;
    border: none;
    border-radius: 14px;
    color: white;
    cursor: pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,0.2);
    transition: all 0.08s;
  }
  .letra-btn:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 rgba(0,0,0,0.2);
  }
  .palabras-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 5px;
  }
  .palabra-btn {
    padding: 18px 10px;
    font-size: 1.3rem;
    font-weight: bold;
    border: none;
    border-radius: 18px;
    cursor: pointer;
    color: white;
    box-shadow: 0 5px 0 rgba(0,0,0,0.2);
    transition: all 0.08s;
  }
  .palabra-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 rgba(0,0,0,0.2); }
  .rojo { background: #ef4444; box-shadow: 0 5px 0 #b91c1c; }
  .azul { background: #3b82f6; box-shadow: 0 5px 0 #1d4ed8; }
  .verde { background: #22c55e; box-shadow: 0 5px 0 #15803d; }
  .amarillo { background: #eab308; box-shadow: 0 5px 0 #a16207; }
  .papa { background: #8b5cf6; box-shadow: 0 5px 0 #6d28d9; }
  .naranja { background: #f97316; box-shadow: 0 5px 0 #c2410c; }
  .cian { background: #14b8a6; box-shadow: 0 5px 0 #0f766e; }
  .indigo { background: #6366f1; box-shadow: 0 5px 0 #4338ca; }
  .rosa { background: #ec4899; box-shadow: 0 5px 0 #be185d; }
  .stop-btn {
    margin-top: 15px;
    padding: 12px 20px;
    background: #ef4444;
    color: white;
    border: none;
    border-radius: 30px;
    font-size: 1.2rem;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 0 #991b1b;
    transition: all 0.08s;
    width: 100%;
  }
  .stop-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #991b1b; }

  .player-cover {
    width: 180px;
    height: 180px;
    margin: 0 auto 20px;
    background: linear-gradient(135deg, #a78bfa, #7dd3fc);
    border-radius: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 5rem;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
  }
  .song-title {
    text-align: center;
    font-size: 1.5rem;
    color: #1f2937;
    margin-bottom: 4px;
    font-weight: bold;
  }
  .song-artist {
    text-align: center;
    color: #6b7280;
    margin-bottom: 12px;
    font-size: 1rem;
  }
  .time-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.85rem;
    color: #4b5563;
    margin-bottom: 6px;
  }
  .progress-container {
    background: #e5e7eb;
    height: 14px;
    border-radius: 10px;
    margin-bottom: 25px;
    cursor: pointer;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #8b5cf6, #3b82f6);
    width: 0%;
    border-radius: 10px;
    transition: width 0.05s linear;
  }
  .controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 25px;
    margin-bottom: 25px;
  }
  .control-btn {
    width: 60px;
    height: 60px;
    border: none;
    border-radius: 50%;
    background: #f3f4f6;
    font-size: 1.5rem;
    cursor: pointer;
    box-shadow: 0 4px 0 #d1d5db;
    transition: all 0.08s;
  }
  .control-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #d1d5db; }
  .play-btn {
    width: 85px;
    height: 85px;
    background: linear-gradient(135deg, #8b5cf6, #3b82f6);
    color: white;
    font-size: 2.2rem;
    box-shadow: 0 6px 0 #5b21b6;
  }
  .playlist {
    max-height: 200px;
    overflow-y: auto;
  }
  .playlist-item {
    padding: 14px;
    margin-bottom: 8px;
    background: #f9fafb;
    border-radius: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.2s;
    border: 2px solid transparent;
  }
  .playlist-item:hover { background: #f3e8ff; }
  .playlist-item.active {
    background: #ede9fe;
    border-color: #8b5cf6;
  }
  .playlist-icon { font-size: 1.5rem; }
</style>
</head>
<body>
  <h1>🌟 Canta y Cuenta 🌟</h1>
  
  <div class="container">
    <!-- LADO IZQUIERDO: VOZ -->
    <div class="card">
      <h2>🗣️ Aprende con Voz</h2>
      
      <h3 style="margin-bottom:12px; color:#374151;">Números del 1 al 10:</h3>
      <div class="numeros-grid" id="numeros"></div>
      <div id="visual"></div>
      
      <h3 style="margin: 15px 0 12px; color:#374151;">Abecedario:</h3>
      <div class="abecedario-grid" id="abecedario"></div>
      
      <h3 style="margin: 15px 0 12px; color:#374151;">Palabras y Colores:</h3>
      <div class="palabras-grid" id="palabras"></div>
      
      <button class="stop-btn" onclick="detenerVoz()">🔇 ¡Silencio!</button>
    </div>

    <!-- LADO DERECHO: REPRODUCTOR -->
    <div class="card">
      <h2>🎵 Mi Música</h2>
      
      <div class="player-cover" id="cover">🎵</div>
      <div class="song-title" id="title">Canción 1</div>
      <div class="song-artist">Canta y Cuenta</div>
      
      <div class="time-row">
        <span id="currentTime">0:00</span>
        <span id="totalTime">0:00</span>
      </div>
      <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      
      <div class="controls">
        <button class="control-btn" onclick="anterior()">⏮️</button>
        <button class="control-btn play-btn" id="playBtn" onclick="togglePlay()">▶️</button>
        <button class="control-btn" onclick="siguiente()">⏭️</button>
      </div>
      
      <div class="playlist" id="playlist"></div>
      
      <audio id="audio" preload="metadata"></audio>
    </div>
  </div>

<script>
  // ===== VOZ ARGENTINA MEJORADA =====
  let vozSeleccionada = null;
  let encolarFeedback = false;
  let numeroActual = '';

  function inicializarVoz() {
    if (!('speechSynthesis' in window)) return;
    const voces = speechSynthesis.getVoices();
    vozSeleccionada = voces.find(v => v.lang.includes('es-AR')) ||
                      voces.find(v => v.lang.includes('es-ES')) ||
                      voces.find(v => v.lang.startsWith('es')) ||
                      null;
  }
  if (window.speechSynthesis) {
    speechSynthesis.onvoiceschanged = inicializarVoz;
    setTimeout(inicializarVoz, 100);
  }

  function hablar(texto, esNumero = false) {
    if (!('speechSynthesis' in window)) return;
    speechSynthesis.cancel();

    const msg = new SpeechSynthesisUtterance(texto);
    msg.lang = 'es-AR';
    msg.rate = 0.78;
    msg.pitch = 1.15;
    if (vozSeleccionada) msg.voice = vozSeleccionada;

    if (esNumero) {
      numeroActual = texto;
      encolarFeedback = true;
      msg.onend = function() {
        if (encolarFeedback) {
          const feedback = new SpeechSynthesisUtterance(`¡Muy bien, ${numeroActual}!`);
          feedback.lang = 'es-AR';
          feedback.rate = 0.85;
          feedback.pitch = 1.3;
          if (vozSeleccionada) feedback.voice = vozSeleccionada;
          speechSynthesis.speak(feedback);
          encolarFeedback = false;
        }
      };
    } else {
      encolarFeedback = false;
    }
    speechSynthesis.speak(msg);
  }

  function detenerVoz() {
    if ('speechSynthesis' in window) {
      speechSynthesis.cancel();
      encolarFeedback = false;
    }
  }

  // ===== NÚMEROS =====
  const numerosNombres = ['cero','uno','dos','tres','cuatro','cinco','seis','siete','ocho','nueve','diez'];
  const numerosContainer = document.getElementById('numeros');
  const visual = document.getElementById('visual');
  for(let i=1; i<=10; i++){
    const btn = document.createElement('button');
    btn.className = 'numero-btn';
    btn.textContent = i;
    btn.setAttribute('aria-label', `Número ${i}`);
    btn.onclick = () => {
      hablar(numerosNombres[i], true);
      visual.textContent = '⭐'.repeat(i);
      visual.style.transform = 'scale(1.3)';
      setTimeout(()=> visual.style.transform = 'scale(1)', 300);
    };
    numerosContainer.appendChild(btn);
  }

  // ===== ABECEDARIO =====
  const letras = ['A','B','C','D','E','F','G','H','I','J','K','L','M','N','Ñ','O','P','Q','R','S','T','U','V','W','X','Y','Z'];
  const coloresLetras = ['#ef4444','#f97316','#f59e0b','#eab308','#84cc16','#22c55e','#10b981','#14b8a6','#06b6d4','#0ea5e9','#3b82f6','#6366f1','#8b5cf6','#a855f7','#d946ef','#ec4899','#f43f5e','#f97316','#14b8a6','#3b82f6','#8b5cf6','#ec4899','#22c55e','#eab308','#f59e0b','#ef4444','#6366f1'];
  const abecedarioContainer = document.getElementById('abecedario');
  letras.forEach((letra, i) => {
    const btn = document.createElement('button');
    btn.className = 'letra-btn';
    btn.textContent = letra;
    btn.style.background = coloresLetras[i % coloresLetras.length];
    btn.setAttribute('aria-label', `Letra ${letra}`);
    btn.onclick = () => hablar(letra, false);
    abecedarioContainer.appendChild(btn);
  });

  // ===== PALABRAS Y COLORES =====
  const palabras = [
    { texto: 'Rojo', clase: 'rojo' },
    { texto: 'Azul', clase: 'azul' },
    { texto: 'Verde', clase: 'verde' },
    { texto: 'Amarillo', clase: 'amarillo' },
    { texto: 'Papá', clase: 'papa' },
    { texto: 'Mamá', clase: 'rosa' },
    { texto: 'Hola', clase: 'naranja' },
    { texto: 'Gracias', clase: 'cian' },
    { texto: 'Adiós', clase: 'indigo' },
    { texto: 'Perro', clase: 'rojo' },
    { texto: 'Gato', clase: 'azul' },
    { texto: 'Sol', clase: 'amarillo' },
    { texto: 'Luna', clase: 'verde' },
    { texto: 'Estrella', clase: 'papa' },
    { texto: 'Flor', clase: 'rosa' }
  ];
  const palabrasContainer = document.getElementById('palabras');
  palabras.forEach(p => {
    const btn = document.createElement('button');
    btn.className = `palabra-btn ${p.clase}`;
    btn.textContent = p.texto;
    btn.setAttribute('aria-label', `Palabra ${p.texto}`);
    btn.onclick = () => hablar(p.texto, false);
    palabrasContainer.appendChild(btn);
  });

  // ===== REPRODUCTOR =====
  const playlist = [
    { titulo: "Canción 1", src: "CANCIONES/cancion-1.mp3", icono: "🌸" },
    { titulo: "Canción 2", src: "CANCIONES/cancion-2.mp3", icono: "🚂" }
  ];

  let currentIndex = 0;
  const audio = document.getElementById('audio');
  const playBtn = document.getElementById('playBtn');
  const titleEl = document.getElementById('title');
  const coverEl = document.getElementById('cover');
  const progressBar = document.getElementById('progressBar');
  const progressContainer = document.getElementById('progressContainer');
  const playlistEl = document.getElementById('playlist');
  const currentTimeEl = document.getElementById('currentTime');
  const totalTimeEl = document.getElementById('totalTime');

  function formatearTiempo(segundos) {
    if (isNaN(segundos)) return '0:00';
    const mins = Math.floor(segundos / 60);
    const secs = Math.floor(segundos % 60);
    return `${mins}:${secs.toString().padStart(2, '0')}`;
  }

  function cargarCancion(index) {
    currentIndex = index;
    const song = playlist[index];
    audio.src = song.src;
    titleEl.textContent = song.titulo;
    coverEl.textContent = song.icono;
    document.querySelectorAll('.playlist-item').forEach((el, i) => {
      el.classList.toggle('active', i === index);
    });
    audio.addEventListener('loadedmetadata', function() {
      totalTimeEl.textContent = formatearTiempo(audio.duration);
    });
    audio.onerror = function() {
      totalTimeEl.textContent = '??:??';
    };
  }

  function togglePlay() {
    if (audio.paused) {
      audio.play().catch(e => {});
      playBtn.textContent = '⏸️';
    } else {
      audio.pause();
      playBtn.textContent = '▶️';
    }
  }

  function siguiente() {
    cargarCancion((currentIndex + 1) % playlist.length);
    audio.play().catch(e => {});
    playBtn.textContent = '⏸️';
  }

  function anterior() {
    cargarCancion((currentIndex - 1 + playlist.length) % playlist.length);
    audio.play().catch(e => {});
    playBtn.textContent = '⏸️';
  }

  audio.addEventListener('timeupdate', () => {
    if (audio.duration) {
      const percent = (audio.currentTime / audio.duration) * 100;
      progressBar.style.width = percent + '%';
      currentTimeEl.textContent = formatearTiempo(audio.currentTime);
    }
  });

  audio.addEventListener('ended', siguiente);

  progressContainer.addEventListener('click', (e) => {
    const width = progressContainer.clientWidth;
    const clickX = e.offsetX;
    if (audio.duration) {
      audio.currentTime = (clickX / width) * audio.duration;
    }
  });

  playlist.forEach((song, i) => {
    const item = document.createElement('div');
    item.className = 'playlist-item';
    if (i === 0) item.classList.add('active');
    item.innerHTML = `<span class="playlist-icon">${song.icono}</span><span>${song.titulo}</span>`;
    item.onclick = () => { cargarCancion(i); audio.play().catch(e=>{}); playBtn.textContent='⏸️'; };
    playlistEl.appendChild(item);
  });

  cargarCancion(0);

  audio.addEventListener('play', () => playBtn.textContent = '⏸️');
  audio.addEventListener('pause', () => playBtn.textContent = '▶️');

  window.addEventListener('load', function() {
    setTimeout(inicializarVoz, 200);
  });
</script>
</body>
</html>
